name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# 同一分支/PR 的并发构建只保留最新一次
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 构建验证
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        # 项目当前使用 package-lock.json，没有 pnpm-lock.yaml，
        # 因此不用 --frozen-lockfile，让 pnpm 基于 package.json 解析
        run: pnpm install --no-frozen-lockfile

      - name: 构建
        run: pnpm run build
        env:
          # 覆盖脚本里硬编码的 Windows 路径，把产物输出到 dist/
          SAVOR_DIST_DIR: ${{ github.workspace }}/dist

      - name: 上传构建产物（供下载核查）
        uses: actions/upload-artifact@v4
        with:
          name: theme-dist
          path: dist/
          retention-days: 7

  release:
    name: 发布 Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 Release 需要
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: pnpm install --no-frozen-lockfile

      - name: 构建
        run: pnpm run build
        env:
          SAVOR_DIST_DIR: ${{ github.workspace }}/dist

      - name: 打包 zip
        # 思源主题市场要求：zip 命名为 package.zip，解压后顶层即主题文件（不套目录）
        run: |
          cd dist
          zip -r ../package.zip .

      - name: 上传 zip 产物（便于失败时排查）
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ github.ref_name }}
          path: package.zip
          retention-days: 7

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: package.zip
          generate_release_notes: true
